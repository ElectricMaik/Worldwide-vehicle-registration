name: Build and Deploy to Public Repo

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml matplotlib

      - name: Update data
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/update_data.py

      - name: Commit data changes back to private repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/countries/
          if ! git diff --cached --quiet; then
            git commit -m "data: update registrations [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            # Force-push eigene Änderungen — kein Rebase nötig für Datendateien
            git push --force-with-lease origin main
          else
            echo "No data changes — skipping commit."
          fi

      - name: Deploy to public repo
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # Frisch klonen (immer sauberer Stand)
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/ElectricMaik/Worldwide-vehicle-registration.git public_deploy

          # Nur die nötigen Dateien kopieren
          cp index.html public_deploy/index.html
          mkdir -p public_deploy/data/countries
          cp data/countries/*.json public_deploy/data/countries/

          # In public repo pushen — ours-Strategie vermeidet Konflikte
          cd public_deploy
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          else
            echo "Nothing new to deploy."
          fi
