name: Build and Deploy to Public Repo

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml matplotlib

      - name: Update data
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/update_data.py

      - name: Commit data changes back to private repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/countries/
          if ! git diff --cached --quiet; then
            git commit -m "data: update registrations [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Deploy to public repo
        env:
          # Personal Access Token with "repo" scope
          # Create at: github.com/settings/tokens → "Fine-grained tokens"
          # Give it write access to your PUBLIC repo only
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          PUBLIC_REPO: ElectricMaik/Worldwide-vehicle-registration
        run: |
          # Clone public repo
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/${PUBLIC_REPO}.git public_deploy
          
          # Copy only the files users need to see
          cp index.html public_deploy/index.html
          cp -r data/countries/ public_deploy/data/countries/
          
          # Commit and push to public repo
          cd public_deploy
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "deploy: update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          else
            echo "Nothing to deploy."
          fi
